<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HUD</title>

    <style>

        body{
          background:transparent;
          margin:0;
          overflow:hidden;
          font-family:Roboto,Arial;
        }

        /* ===== HUD PANEL ===== */

.hud{
  position:relative;
  order:1;
  top:auto;
  left:auto;
  width:auto;
  min-width:0;
  overflow:hidden;

  transform:
    translateY(-120px)
    scale(var(--scale, .92));

  padding:12px 18px;
  border-radius:18px;

  background:transparent;

  transform-origin:center center;
  transition:
    transform .42s cubic-bezier(.19,1,.22,1),
    opacity .28s ease,
    width .28s ease,
    padding .28s ease,
    background .28s ease;
  opacity:0;
  will-change:transform, opacity;
}

.hud:not(.visible){
  width:0;
  padding-left:0;
  padding-right:0;
}

.hud.both{
    background:linear-gradient(
        180deg,
        rgba(240,240,240,.45),
        rgba(200,200,200,.25)
    );
    backdrop-filter: blur(20px);
}
.hud.show{
  transform:translateY(0) scale(1);
  --scale:1;
  animation:hudReveal .46s cubic-bezier(.19,1,.22,1);
}
.hud.visible{
  opacity:1;
}

      .hud .turnIcon{
  width:35px;
  height:35px;
}

.hud .distance{
  font-size:28px;
  min-width:70px;
}

.hud .distance.hidden{
  display:none;
}

.hud .limit{
  width:36px;
  height:36px;
  font-size:20px;
  border-width:4px;
}

.hud .hud-inner{
  gap:12px;
}

.hud.show .hud-inner{
  animation:hudContentRise .5s cubic-bezier(.22,.61,.36,1);
}

        .hidden{
          opacity:0;
          transform:translateX(-50%) translateY(50px) scale(.9);
          pointer-events:none;
        }

        .hud-inner{
          display:flex;
          align-items:center;
          gap:22px;
        }

        .hud-center{
          display:flex;
          flex-direction:column;
        }
        .hud-next{
  display:flex;
  align-items:center;
  gap:10px;
}

        .turnIcon{
          width:35px;
  height:35px;
        }

        .distance{
          font-size:58px;
          font-weight:700;
          letter-spacing:1px;
          white-space:nowrap;
           min-width:140px;
           color:#fff;
            text-align:center;
          transition:.18s;
          display:inline-block;
        }

        .road{
          font-size:20px;
          opacity:.75;
          max-width:260px;
        }

        .limit{
   width:78px;
   height:78px;

   border-radius:50%;
   background:#fff;

   border:8px solid #ff2b2b;

   color:#000;
   font-weight:700;
   font-size:40px;

   display:flex;
   align-items:center;
   justify-content:center;

   box-shadow:
       0 4px 12px rgba(0,0,0,.5),
       inset 0 0 6px rgba(0,0,0,.25);

   transition:.25s;
}

        .radar{
          width:54px;
          height:54px;
          animation: radarBlink 1.1s infinite;
        }

        @keyframes radarBlink{
          0%{opacity:.3; transform:scale(.9)}
          50%{opacity:1; transform:scale(1)}
          100%{opacity:.3; transform:scale(.9)}
        }

        /* ===== MINI HUD (верхний) ===== */

.hud-row{
  position:absolute;
  top:47px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:flex-start;
  gap:0;
  z-index:2;
}

.hud-row.compact-dual{
  gap:0;
  transform:translateX(-50%);
}

.hud-row.compact-dual .hud-top{
  position:absolute;
  left:100%;
  top:0;
  margin-left:4px;
  padding:12px 12px;
}

.hud-row.compact-dual .hud-top .hud-inner{
  gap:6px;
}

.hud-row.compact-dual .hud-top .distance{
  min-width:42px;
  font-size:21px;
  letter-spacing:0;
}

.hud-top{
  position:relative;
  order:2;
  width:auto;
  overflow:hidden;

  top:auto;
  left:auto;
  transform:translateY(-120px) scale(.92);

  padding:12px 18px;
  border-radius:18px;

   background:transparent;

  transform-origin:left center;
  transition:
    transform .4s cubic-bezier(.22,.61,.36,1),
    opacity .26s ease,
    width .24s ease,
    padding .24s ease;
  opacity:0;
  will-change:transform, opacity;
}

.hud-top:not(.show){
  width:0;
  padding-left:0;
  padding-right:0;
}

.hud-top.show{
  transform:translateY(0) scale(1);
  opacity:1;
  animation:radarReveal .42s cubic-bezier(.22,.61,.36,1);
}


.hud-top .turnIcon{
  width:30px;
  height:30px;
}

.hud-top .distance{
  font-size:24px;
  min-width:58px;
}

.hud-top .limit{
  width:34px;
  height:34px;
  font-size:18px;
  border-width:4px;
}

.hud-top .hud-inner{
  gap:10px;
}

.hud-top.show .hud-inner{
  animation:radarContentReveal .46s cubic-bezier(.22,.61,.36,1);
}

.turnIcon,
.limit,
.distance,
.road{
  transition:
    transform .24s ease,
    opacity .24s ease,
    filter .24s ease;
}

.hud.show .turnIcon{
  animation:turnBreath 2.6s ease-in-out infinite;
}

.hud.show .limit,
.hud-top.show .limit{
  animation:limitPop .46s cubic-bezier(.22,.61,.36,1);
}

@keyframes hudReveal{
  0%{
    opacity:0;
    transform:translateY(-18px) scale(.94);
    filter:blur(4px);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
  }
}

@keyframes hudContentRise{
  0%{
    opacity:0;
    transform:translateY(8px) scale(.98);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@keyframes radarReveal{
  0%{
    opacity:0;
    transform:translateX(-10px) translateY(-10px) scale(.9);
    filter:blur(3px);
  }
  100%{
    opacity:1;
    transform:translateX(0) translateY(0) scale(1);
    filter:blur(0);
  }
}

@keyframes radarContentReveal{
  0%{
    opacity:0;
    transform:translateX(-6px);
  }
  100%{
    opacity:1;
    transform:translateX(0);
  }
}

@keyframes turnBreath{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-1px) scale(1.03);
  }
}

@keyframes limitPop{
  0%{
    transform:scale(.84);
  }
  65%{
    transform:scale(1.06);
  }
  100%{
    transform:scale(1);
  }
}

  .gps{
    position:absolute;
    top:47px;
    left:50%;
    transform:translateX(-500%);

    width:35px;
    height:35px;

    padding:7px;
    border-radius:14px;

    backdrop-filter: blur(25px);
    background:rgba(0,0,0,.42);

    display:flex;
    align-items:flex-end;
    justify-content:center;

    box-sizing:border-box;

    opacity:0;
    transition:.35s;
    z-index:3;
}

.gps.visible{
    opacity:1;
}

/* ===== шкала ===== */

.gps-bars{
    width:100%;
    height:100%;

    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:3px;

    transition:.35s;
}

.gps-bars span{
    width:4px;
    border-radius:3px;
    background:#3a3a3a;
    transition:.35s;
}

.gps-bars span:nth-child(1){height:25%}
.gps-bars span:nth-child(2){height:40%}
.gps-bars span:nth-child(3){height:55%}
.gps-bars span:nth-child(4){height:70%}
.gps-bars span:nth-child(5){height:90%}

/* ===== уровни ===== */

.gps.level-1 .gps-bars span:nth-child(1){
    background:#ffd400;
}

.gps.level-2 .gps-bars span:nth-child(-n+2){
    background:#e6ff00;
}

.gps.level-3 .gps-bars span:nth-child(-n+3){
    background:#baff00;
}

.gps.level-4 .gps-bars span:nth-child(-n+4){
    background:#6aff00;
}

.gps.level-5 .gps-bars span{
    background:#00ff87;
}

/* ===== LOW SIGNAL ===== */

.gps-low{
    position:absolute;
    width:15px;
    height:15px;
    border-radius:50%;

    background:#ff2b2b;

    opacity:0;
    transform:scale(.6);

    box-shadow:
        0 0 12px #ff2b2b,
        0 0 22px #ff2b2b,
        0 0 32px rgba(255,0,0,.5);

    transition:.35s;
}

.gps.low .gps-bars{
    opacity:0;
    transform:scale(.6);
}

.gps.low .gps-low{
    opacity:1;
    transform:scale(1);
}

    </style>
</head>
